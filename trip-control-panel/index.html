<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f2" />
    <title>2026 瑞德行控制台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=20260608-hero2" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">2026.06.22 - 07.14</p>
          <h1>瑞德行控制台</h1>
          <p class="route">Kaohsiung → Zurich → Alps → Legoland → Salzburg → Munich</p>
        </div>
        <img src="../exports/assets/cover-family-route-hero.png?v=20260608-hero3" alt="瑞士德國奧地利旅行路線圖" />
      </header>

      <main>
        <section class="quick-strip" aria-label="常用入口">
          <a class="quick-button notion" href="https://www.notion.so/2bdd977afa3180a09e4ce5d7d716896c" target="_blank" rel="noreferrer">
            Notion
          </a>
          <button class="quick-button" type="button" data-open-view="actions">
            待辦
          </button>
          <a class="quick-button" href="../exports/2026-swiss-germany-austria-travel-learning-journal-a5.pdf?v=20260608" target="_blank">
            A5 PDF
          </a>
          <a class="quick-button" href="https://www.google.com/maps/search/?api=1&query=Hotel%20Monopol%20Luzern" target="_blank" rel="noreferrer">
            首站飯店
          </a>
        </section>

        <nav class="tabs" aria-label="控制台分頁">
          <button class="tab is-active" type="button" data-view="today">今日</button>
          <button class="tab" type="button" data-view="days">日程</button>
          <button class="tab" type="button" data-view="stays">住宿</button>
          <button class="tab" type="button" data-view="actions">待辦</button>
        </nav>

        <section class="view is-active" id="view-today" aria-labelledby="today-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Now</p>
              <h2 id="today-title">旅程節點</h2>
            </div>
            <div class="day-switcher" aria-label="切換日期">
              <button class="ghost-button compact" type="button" id="prev-day">‹</button>
              <label class="select-wrap">
                <span class="sr-only">選擇日期</span>
                <select id="today-select"></select>
              </label>
              <button class="ghost-button compact" type="button" id="next-day">›</button>
              <button class="ghost-button" type="button" data-open-view="days">日程列表</button>
            </div>
          </div>
          <div id="spotlight"></div>
          <div class="today-grid">
            <div class="panel">
              <h3>今日快捷</h3>
              <div id="today-actions" class="action-list"></div>
            </div>
            <div class="panel">
              <h3>家長備忘</h3>
              <div id="today-notes" class="note-stack"></div>
            </div>
          </div>
        </section>

        <section class="view" id="view-days" aria-labelledby="days-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">D1 - D23</p>
              <h2 id="days-title">每日入口</h2>
            </div>
            <label class="search-box">
              <span>⌕</span>
              <input id="day-filter" type="search" placeholder="搜尋地點 / D7 / Salzburg" autocomplete="off" />
            </label>
          </div>
          <div id="day-list" class="day-list"></div>
        </section>

        <section class="view" id="view-stays" aria-labelledby="stays-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Hotels</p>
              <h2 id="stays-title">住宿節點</h2>
            </div>
          </div>
          <div id="stay-list" class="stay-list"></div>
        </section>

        <section class="view" id="view-actions" aria-labelledby="actions-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Before Departure</p>
              <h2 id="actions-title">出發前待辦</h2>
            </div>
            <div class="button-row heading-actions">
              <a class="ghost-button" href="./checklist.html" target="_blank">完整清單</a>
              <a class="ghost-button" href="https://www.notion.so/34fd977afa318129999eecc0099f921e" target="_blank" rel="noreferrer">Notion 待辦</a>
            </div>
          </div>
          <div id="action-board" class="action-board"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog class="day-dialog" id="day-dialog">
      <div class="dialog-top">
        <div>
          <p class="eyebrow" id="dialog-code"></p>
          <h2 id="dialog-title"></h2>
        </div>
        <button class="icon-button" type="button" id="close-dialog" aria-label="關閉">×</button>
      </div>
      <div id="dialog-body"></div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
